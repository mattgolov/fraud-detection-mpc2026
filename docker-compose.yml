version: '3.9'

services:
  api:
    build:
      context: ./api/API_FRAUD_DETECT
      dockerfile: Dockerfile
    container_name: mcphacks_api
    command: /app/entrypoint.sh
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./api/API_FRAUD_DETECT:/app
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend/frontend_fraud_detect
      dockerfile: Dockerfile
    container_name: mcphacks_frontend
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/frontend_fraud_detect:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"

volumes:
  frontend_node_modules:
    driver: local
